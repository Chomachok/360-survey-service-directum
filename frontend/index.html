    <title>Directum360 Feedback</title>
    <script>
      // применяем сохранённую тему сразу, чтобы прелоадер не «мигал» не тем фоном
      try {
        if (localStorage.getItem('theme') === 'dark') {
          document.documentElement.classList.add('dark')
        }
      } catch (e) {}
    </script>
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9fafb;
        transition: opacity 0.35s ease;
      }
      html.dark #app-loader {
        background: #111827;
      }
      #app-loader.app-loader--hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-loader .d360-orbit {
        transform-origin: 60px 60px;
        animation: d360-spin 1.6s linear infinite;
      }
      @keyframes d360-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-loader .d360-orbit { animation: none; }
      }
      html.dark #app-loader .d360-loader-text {
        fill: #f9fafb;
      }
    </style>
  </head>

    <div id="root"></div>
    <script>
      // прячем прелоадер, как только React отрисовал содержимое #root
      ;(function () {
        var loader = document.getElementById('app-loader')
        var root = document.getElementById('root')
        function hideLoader() {
          if (!loader) return
          loader.classList.add('app-loader--hidden')
          setTimeout(function () {
            loader.remove()
          }, 400)
        }
        var observer = new MutationObserver(function () {
          if (root.childNodes.length > 0) {
            hideLoader()
            observer.disconnect()
          }
        })
        observer.observe(root, { childList: true })
        // подстраховка на случай, если что-то пойдёт не так
        setTimeout(hideLoader, 8000)
      })()
    </script>
